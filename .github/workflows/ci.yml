name: Build

on:
  push:
    branches:
      - "master"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"
  USE_UPX: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Install test dependencies
        run: |
          sudo apt update
          sudo apt install libcairo2-dev libgirepository1.0-dev pkg-config gir1.2-ayatanaappindicator3-0.1 libayatana-appindicator3-1 python3-tk xvfb
          python3 -m pip install wheel
          python3 -m pip install -r requirements.txt

      - name: Validate language files
        run: |
          failed=()
          for file in "lang/"*.json; do
            if err="$(python -m json.tool "${file}" 2>&1 >/dev/null)"; then
              echo "[OK] ${file}"
            else
              echo "[ERROR] ${file} ${err}"
              failed+=("${file}")
            fi
          done
          if [ "${#failed[@]}" -gt 0 ]; then
            echo -e "\nFailed to validate the following language file(s): ${failed[@]}"
            exit 1
          fi

      - name: Run tests
        run: xvfb-run --auto-servernum python3 -m unittest discover -s tests -v

  windows:
    name: Windows
    if: github.event_name != 'pull_request'
    runs-on: windows-2025
    needs:
      - validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up variables
        id: vars
        run: |
          Add-Content $env:GITHUB_OUTPUT "sha_short=$(git rev-parse --short HEAD)"

      - name: Append git revision to project version
        run: |
          (Get-Content version.py) `
          -Replace '^__version__\s*=\s*"[^"]+', "`$0.${{steps.vars.outputs.sha_short}}" |`
          Out-File version.py

      # Ensure Python version
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Install project dependencies
        run: |
          python3 -m pip install wheel
          python3 -m pip install -r requirements.txt

      # TODO: Consider using https://github.com/crazy-max/ghaction-upx
      # or some other way of keeping the download link up to date in the future
      - name: Install UPX
        if: env.USE_UPX == 'true'
        run: |
          Invoke-WebRequest -Uri https://github.com/upx/upx/releases/download/v5.0.2/upx-5.0.2-win64.zip -OutFile (Join-Path $env:Temp upx.zip)
          Expand-Archive -LiteralPath (Join-Path $env:Temp upx.zip) -DestinationPath $env:Temp
          Move-Item -Path (Join-Path $env:Temp upx-*) -Destination (Join-Path $env:Temp upx)
          Add-Content $env:GITHUB_PATH (Join-Path $env:Temp upx)

      - name: Install PyInstaller
        run: |
          python3 -m pip install pyinstaller

      - name: Create portable executable
        run: |
          pyinstaller build.spec

      - name: Create release folder
        run: |
          $FolderName = 'Kick Drops Miner'
          New-Item $FolderName -ItemType Directory
          Copy-Item dist\*.exe $FolderName
          Copy-Item manual.txt $FolderName
          Compress-Archive -Path $FolderName -DestinationPath Kick.Drops.Miner.Windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: Kick.Drops.Miner.Windows
          path: Kick.Drops.Miner.Windows.zip

  macos:
    name: macOS (arm64)
    if: github.event_name != 'pull_request'
    runs-on: macos-15
    needs:
      - validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up variables
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Append git revision to project version
        run: |
          sed -i '' -E "s/^(__version__\s*=\s*\"[^\"]+)/\1.${{steps.vars.outputs.sha_short}}/" version.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{env.PYTHON_VERSION}}

      - name: Install project dependencies
        run: |
          python3 -m pip install wheel
          python3 -m pip install -r requirements.txt

      - name: Install PyInstaller
        run: |
          python3 -m pip install pyinstaller

      - name: Create portable executable
        run: |
          pyinstaller build.spec --noconfirm

      - name: Smoke test application launch
        run: |
          app="dist/Kick Drops Miner.app"
          executable_name=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")
          "$app/Contents/MacOS/$executable_name" &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          sleep 8
          kill -0 "$pid"
          osascript -e 'tell application "System Events" to get name of every process whose unix id is '"$pid" | grep -q "Kick Drops Miner"
          kill "$pid"
          wait "$pid" || true
          trap - EXIT

      - name: Verify application bundle
        run: |
          app="dist/Kick Drops Miner.app"
          test -d "$app"
          executable_name=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")
          bundle_id=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app/Contents/Info.plist")
          test "$bundle_id" = "com.kickdrops.miner"
          test -x "$app/Contents/MacOS/$executable_name"
          file "$app/Contents/MacOS/$executable_name" | grep -q 'arm64'
          test "$(lipo -archs "$app/Contents/MacOS/$executable_name")" = "arm64"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign -dv --verbose=4 "$app" 2>&1 | grep -q 'Signature=adhoc'

      - name: Create release archive
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Kick Drops Miner.app" \
            Kick.Drops.Miner.macOS-arm64.zip
          test -s Kick.Drops.Miner.macOS-arm64.zip
          unzip -Z1 Kick.Drops.Miner.macOS-arm64.zip | \
            grep -q '^Kick Drops Miner.app/Contents/Info.plist$'
          mkdir extracted
          ditto -x -k Kick.Drops.Miner.macOS-arm64.zip extracted
          codesign --verify --deep --strict --verbose=2 \
            "extracted/Kick Drops Miner.app"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: Kick.Drops.Miner.macOS-arm64
          path: Kick.Drops.Miner.macOS-arm64.zip

  linux-appimage:
    name: Linux (AppImage) (${{matrix.arch}})
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    runs-on: ${{matrix.runner}}
    needs:
      - validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up variables
        id: vars
        run: |
          echo "app_version=$(python3 -c 'from version import __version__ as v; print(v)')" >> "${GITHUB_OUTPUT}"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Append git revision to project version
        run: |
          sed -ri "s/^__version__\s*=\s*\"[^\"]+/\0.${{steps.vars.outputs.sha_short}}/" version.py

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install libcairo2-dev libgirepository1.0-dev pkg-config gir1.2-ayatanaappindicator3-0.1 libayatana-appindicator3-1

      - name: Install appimage-builder
        run: |
          # TODO: Switch to a stable release if/when a version newer than 1.1.0 is released.
          python3 -m pip install git+https://github.com/AppImageCrafters/appimage-builder.git@e995e8edcc227d14524cf39f9824c238f9435a22

      - name: Create AppImage
        env:
          ARCH: ${{matrix.arch}}
          ARCH_APT: ${{matrix.arch == 'x86_64' && 'amd64' || 'arm64'}}
          APP_VERSION: ${{steps.vars.outputs.app_version}}.${{steps.vars.outputs.sha_short}}
          PYTHON_VERSION: ${{env.PYTHON_VERSION}}
        run: |
          appimage-builder --recipe appimage/AppImageBuilder.yml

      - name: Verify AppImage
        run: |
          image='Kick.Drops.Miner-${{matrix.arch}}.AppImage'
          test -f "$image"
          test -s "$image"
          chmod +x "$image"
          case '${{matrix.arch}}' in
            x86_64) file "$image" | grep -q 'x86-64' ;;
            aarch64) file "$image" | grep -q 'ARM aarch64' ;;
            *) echo "Unsupported architecture: ${{matrix.arch}}" >&2; exit 1 ;;
          esac
          rm -rf squashfs-root
          "./$image" --appimage-extract >/dev/null
          test -x squashfs-root/AppRun

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: Kick.Drops.Miner.Linux-${{matrix.arch}}
          path: Kick.Drops.Miner-${{matrix.arch}}.AppImage
          compression-level: 0

  update_releases_page:
    name: Upload builds to Releases
    if: github.event_name != 'pull_request'
    needs:
      - windows
      - linux-appimage
      - macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set up variables
        id: vars
        run: |
          echo "date_now=$(date --rfc-3339=seconds)" >> "${GITHUB_OUTPUT}"

      - name: Download build artifacts from previous jobs
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Verify release artifacts
        run: |
          test -s artifacts/Kick.Drops.Miner.Windows/Kick.Drops.Miner.Windows.zip
          test -s artifacts/Kick.Drops.Miner.Linux-x86_64/Kick.Drops.Miner-x86_64.AppImage
          test -s artifacts/Kick.Drops.Miner.Linux-aarch64/Kick.Drops.Miner-aarch64.AppImage
          test -s artifacts/Kick.Drops.Miner.macOS-arm64/Kick.Drops.Miner.macOS-arm64.zip

      - name: Delete the existing pre-release (if present)
        run: |
          TAG=dev-build
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$TAG" --cleanup-tag --yes --repo "$GITHUB_REPOSITORY"
          else
            echo "No $TAG release; skipping delete"
          fi
        env:
          GITHUB_TOKEN: ${{github.token}}

      - name: Create a new dev build release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: artifacts/*/*
          body: |
            **This is an automatically generated in-development pre-release version of the application, that includes the latest master branch changes.**
            **⚠️ This build is not stable and may end up terminating with a fatal error. ⚠️**
            **Use at your own risk.**

            - Last build date: `${{steps.vars.outputs.date_now}}`
            - Reference commit: ${{github.sha}}
          name: Development build
          prerelease: true
          removeArtifacts: true
          tag: dev-build
